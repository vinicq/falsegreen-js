name: release

# Builds the package and publishes it to npm via Trusted Publishing (OIDC).
# No long-lived NPM_TOKEN: the publish step exchanges a short-lived OIDC identity
# with the npm registry and attaches build provenance.
# Fires on a GitHub release being published, or manually for an existing tag.
#
# One-time human setup before the first run (see RELEASE.md):
#   1. npmjs.com: add a Trusted Publisher for package `falsegreen-js`
#      (GitHub owner vinicq, repo falsegreen-js, workflow release.yml).
#   2. First publish of a brand-new package name may require an initial manual
#      `npm publish` to claim the name, depending on npm policy at the time.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm
      # OIDC trusted publishing (tokenless auth) needs npm >= 11.5.1; Node 20
      # ships npm 10, which signs provenance but cannot authenticate via OIDC.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Tag matches package version
        if: github.event_name == 'release'
        run: test "v$(node -p "require('./package.json').version")" = "${{ github.ref_name }}"
      - name: Publish to npm (skip if the version is already published)
        env:
          # npm Automation token (Settings -> secrets -> NPM_TOKEN). Token auth is
          # the reliable path; --provenance still attaches OIDC build provenance.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          V=$(node -p "require('./package.json').version")
          if npm view "falsegreen-js@$V" version >/dev/null 2>&1; then
            echo "falsegreen-js@$V already on npm — skipping publish"
          else
            npm publish --provenance --access public
          fi
