name: credential-reminder

# Reminds before the npm publish credential expires (#19). The release uses an
# NPM_TOKEN (Automation token) that expires 2026-09-22; an expired token makes the
# release silently 403 at publish. This scheduled job warns from 60 days out and
# fails (emails the owner) inside the final 14 days, so the token gets rotated in
# time. Update EXPIRY here when the token is rotated.

on:
  schedule:
    - cron: "0 9 1 * *"   # 09:00 UTC on the 1st of each month
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-expiry:
    runs-on: ubuntu-latest
    steps:
      - name: Days until the NPM_TOKEN expires
        run: |
          EXPIRY="2026-09-22"
          days=$(( ( $(date -u -d "$EXPIRY" +%s) - $(date -u +%s) ) / 86400 ))
          echo "NPM_TOKEN expires $EXPIRY ($days days from now)."
          if [ "$days" -lt 14 ]; then
            echo "::error::NPM_TOKEN expires in $days days ($EXPIRY). Rotate it (npmjs.com -> Access Tokens) and update the secret + this workflow's EXPIRY."
            exit 1
          elif [ "$days" -lt 60 ]; then
            echo "::warning::NPM_TOKEN expires in $days days ($EXPIRY). Plan a rotation."
          fi
